<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Noto+Nastaliq+Urdu:wght@400..700&family=Orbitron:wght@400..900&family=Phudu:wght@300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/forget-password/style.css" />
     <link rel="stylesheet" href="/globalCSS/style.css">
  </head>
  <body class="bg-[#F5F5F5] flex justify-center items-center h-screen p-3">
    <section
      class="w-full relative min-w-[320px] shadow-md max-w-[800px] h-[500px] bg-white rounded-2xl p-5 flex flex-col items-center gap-4"
    >

    <button
      onclick="history.back()"
        class="bg-[#FF9F01] absolute left-3 top-4 w-[40px] h-[40px] flex rounded-full justify-center items-center rotate-90"
      >
        <svg
          class="rotate-270"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M14.4829 7.03454L9.51739 12.0001L14.4829 16.9656"
            stroke="white"
            stroke-width="2"
            stroke-miterlimit="10"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
    </button>
      <strong>Forget Password</strong>
      <form id="form" action="" class="flex flex-col gap-3 w-full h-full  min-w-[320px] max-w-[450px] justify-between">
        <div class="flex flex-col gap-3">
        <label for="" class="ml-2">Email</label>
        <input
          type="text"
          required
          name="email"
          placeholder="john@gmail.com"
          class="p-3 border border-gray-300 rounded-full pl-5"
        />
      

        </div>
       
        <button class="bg-(--primaryColor) p-3 text-white rounded-full w-full cursor-pointer transform-transition duration-100  hover:bg-green-400">Next</button>
       
      </form>
    </section>
    
    <script type="module" src="/src/forget-password/script.js"></script>
  </body>
</html>
